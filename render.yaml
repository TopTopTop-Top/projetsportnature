services:
  # Web Service Node : doit être redéployé quand src/routes/api.js change (ex. PATCH traces).
  # Si les box passent mais pas les traces, ce service tourne souvent une vieille image sans ces routes.
  - type: web
    name: ravitobox-api
    branch: main
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: JWT_SECRET
        generateValue: true

  - type: static_site
    name: ravitobox-web
    branch: main
    rootDir: mobile
    buildCommand: npm install && npm run build:web
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    # Doit être l’URL du Web Service Node (JSON), jamais l’URL du site statique lui-même.
    envVars:
      - key: EXPO_PUBLIC_API_URL
        value: https://projetsportnature.onrender.com/api
      - key: EXPO_NO_BUNDLE_SPLITTING
        value: "1"
